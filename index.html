<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Spending Tracker" />
  <title>Spending Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Spending Tracker</h1>

    <!-- Monthly Budget Section -->
    <section class="card" id="budget-section">
      <h2>Monthly Budget</h2>
      <div class="budget-display" id="budget-display">
        <span id="budget-label">No budget set</span>
        <button class="btn btn-secondary" id="edit-budget-btn">Set Budget</button>
      </div>
      <div class="budget-form hidden" id="budget-form">
        <input
          type="number"
          id="budget-input"
          placeholder="Enter monthly amount"
          min="0"
          step="0.01"
          inputmode="decimal"
        />
        <button class="btn btn-primary" id="save-budget-btn">Save</button>
        <button class="btn btn-secondary" id="cancel-budget-btn">Cancel</button>
      </div>
    </section>

    <!-- Summary Section -->
    <section class="card" id="summary-section">
      <h2>Summary</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">Budget</span>
          <span class="summary-value" id="summary-budget">$0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Spent</span>
          <span class="summary-value spent" id="summary-spent">$0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Remaining</span>
          <span class="summary-value" id="summary-remaining">$0.00</span>
        </div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="progress-label" id="progress-label">0% used</p>
      <div class="alert hidden" id="over-budget-alert">
        You are over budget!
      </div>
    </section>

    <!-- Add Expense Section -->
    <section class="card">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <div class="form-row">
          <input
            type="text"
            id="expense-name"
            placeholder="Description (e.g. Groceries)"
            required
          />
          <input
            type="number"
            id="expense-amount"
            placeholder="Amount"
            min="0.01"
            step="0.01"
            inputmode="decimal"
            required
          />
          <button class="btn btn-primary" type="submit">Add</button>
        </div>
      </form>
    </section>

    <!-- Expense List Section -->
    <section class="card">
      <div class="section-header">
        <h2>Expenses</h2>
        <button class="btn btn-danger btn-sm" id="clear-all-btn">Clear All</button>
      </div>
      <ul id="expense-list">
        <li class="empty-state" id="empty-state">No expenses yet. Add one above!</li>
      </ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
